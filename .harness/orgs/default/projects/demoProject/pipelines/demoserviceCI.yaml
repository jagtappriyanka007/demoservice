pipeline:
  name: demoservice-CI
  identifier: demoserviceCI
  projectIdentifier: demoProject
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: servicerepo
        repoName: demoservice
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Arm64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: BuildDotnetApp
                  identifier: BuildDotnetApp
                  spec:
                    shell: Sh
                    command: |-
                      dotnet restore
                      dotnet build --configuration Release
