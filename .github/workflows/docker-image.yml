name: Build C# DemoService

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # ✅ Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # ✅ Restore
    - name: Restore dependencies
      run: dotnet restore DemoService.sln

    # ✅ Build
    - name: Build
      run: dotnet build DemoService.sln --configuration Release --no-restore

    # ✅ Test
    - name: Run tests
      run: dotnet test DemoService.sln --no-build --verbosity normal

    # ✅ Install Swagger CLI locally
    - name: Install Swagger CLI
      run: dotnet tool install --tool-path . Swashbuckle.AspNetCore.Cli

    # 🔍 Debug: list files (helps confirm structure)
    - name: List files
      run: ls -R

    # ✅ Find DLL dynamically + Generate OpenAPI
    - name: Generate OpenAPI JSON
      run: |
        DLL_PATH=$(find . -type f -name "DemoService.dll" | grep "Release" | head -n 1)
        
        if [ -z "$DLL_PATH" ]; then
          echo "❌ DLL not found!"
          exit 1
        fi
        
        echo "✅ Using DLL: $DLL_PATH"
        
        ./swagger tofile \
          --output openapi.json \
          "$DLL_PATH" \
          v1

    # ✅ Convert JSON → YAML
    - name: Convert to YAML
      run: |
        npm install -g swagger-cli
        swagger-cli bundle openapi.json --type yaml > openapi.yaml

    # ✅ Upload artifact
    - name: Upload OpenAPI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: openapi-spec
        path: openapi.yaml

    # 🔥 OPTIONAL: Commit back to repo
