name: Build C# DemoService

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # ✅ Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # ✅ Restore
    - name: Restore dependencies
      run: dotnet restore DemoService.sln

    # ✅ Build
    - name: Build
      run: dotnet build DemoService.sln --configuration Release --no-restore

    # ✅ Test
    - name: Run tests
      run: dotnet test DemoService.sln --no-build --verbosity normal

    # ✅ Install Swagger CLI locally (FIXED)
    - name: Install Swagger CLI
      run: dotnet tool install --tool-path . Swashbuckle.AspNetCore.Cli

    # 🔍 Debug: list build output (helps verify DLL path)
    - name: List build output
      run: ls -R

    # ✅ Generate OpenAPI JSON
    - name: Generate OpenAPI JSON
      run: |
        ./swagger tofile \
          --output openapi.json \
          ./bin/Release/net8.0/DemoService.dll \
          v1

    # ✅ Convert JSON → YAML
    - name: Convert to YAML
      run: |
        npm install -g swagger-cli
        swagger-cli bundle openapi.json --type yaml > openapi.yaml

    # ✅ Upload artifact (download from Actions)
    - name: Upload OpenAPI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: openapi-spec
        path: openapi.yaml

    # 🔥 OPTIONAL: Commit back to repo (uncomment if needed)
