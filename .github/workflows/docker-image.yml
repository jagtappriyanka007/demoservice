name: Build C# DemoService

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore DemoService.sln

    - name: Build
      run: dotnet build DemoService.sln --configuration Release --no-restore

    - name: Run tests (optional)
      run: dotnet test DemoService.sln --no-build --verbosity normal

    # ✅ Install Swagger CLI
    - name: Install Swagger CLI
      run: dotnet tool install --global Swashbuckle.AspNetCore.Cli

    # ✅ Add .NET tools to PATH
    - name: Add .NET tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # ✅ Generate OpenAPI JSON
    - name: Generate OpenAPI JSON
      run: |
        dotnet swagger tofile \
          --output openapi.json \
          ./bin/Release/net8.0/DemoService.dll \
          v1

    # ✅ Convert JSON → YAML
    - name: Convert to YAML
      run: |
        npm install -g swagger-cli
        swagger-cli bundle openapi.json --type yaml > openapi.yaml

    # ✅ Upload artifact (so you can download/test)
    - name: Upload OpenAPI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: openapi-spec
        path: openapi.yaml
