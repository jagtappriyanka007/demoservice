name: Build C# DemoService

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Restore
    - name: Restore dependencies
      run: dotnet restore DemoService.sln

    # Build
    - name: Build
      run: dotnet build DemoService.sln --configuration Release --no-restore

    # Test
    - name: Run tests
      run: dotnet test DemoService.sln --no-build --verbosity normal

    # 🚀 Run app on FIXED port
    - name: Run app
      run: |
        dotnet run --project DemoService/DemoService.csproj --urls=http://localhost:5000 &
        sleep 20

    # 🔍 Debug: check if app is running
    - name: Check running process
      run: |
        ps -ef | grep dotnet

    # 📥 Fetch OpenAPI JSON
    - name: Fetch OpenAPI JSON
      run: |
        curl http://localhost:5000/swagger/v1/swagger.json -o openapi.json

    # 🔄 Convert to YAML
    - name: Convert to YAML
      run: |
        npm install -g swagger-cli
        swagger-cli bundle openapi.json --type yaml > openapi.yaml

    # 📦 Upload artifact
    - name: Upload OpenAPI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: openapi-spec
        path: openapi.yaml
