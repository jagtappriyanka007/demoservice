name: Build C# DemoService

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:   # 👈 REQUIRED for Harness/API trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # ✅ updated version

    - name: Setup .NET
      uses: actions/setup-dotnet@v4   # ✅ updated version
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore DemoService.sln

    - name: Build
      run: dotnet build DemoService.sln --configuration Release --no-restore

    - name: Run tests (optional)
      run: dotnet test DemoService.sln --no-build --verbosity normal
