name: Trigger Harness Pipeline

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Harness Pipeline
        run: |
          curl -X POST "https://app.harness.io/gateway/pipeline/api/v1/pipelines/execute" \
          -H "x-api-key: ${{ secrets.HARNESS_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "accountId": "'"${{ secrets.HARNESS_ACCOUNT_ID }}"'",
            "orgIdentifier": "'"${{ secrets.HARNESS_ORG_ID }}"'",
            "projectIdentifier": "'"${{ secrets.HARNESS_PROJECT_ID }}"'",
            "pipelineIdentifier": "'"${{ secrets.HARNESS_PIPELINE_ID }}"'",
            "runPipeline": true
          }'
