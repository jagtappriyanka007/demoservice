openapi: 3.0.1
info:
  title: DemoService
  version: "1.0"

servers:
  - url: http://localhost:5000
    description: Local
  - url: https://api.demo.com
    description: Prod

paths:
  /WeatherForecast:
    get:
      tags:
        - WeatherForecast
      operationId: GetWeatherForecast
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeatherForecast"

components:
  schemas:
    WeatherForecast:
      type: object
      properties:
        date:
          type: string
          format: date
        temperatureC:
          type: integer
        summary:
          type: string

